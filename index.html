<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iron Log</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=JetBrains+Mono:wght@500&display=swap');

    :root{
      --bg:#1c1a18;
      --surface:#262320;
      --surface-2:#312c28;
      --text:#f1ece2;
      --text-dim:#a39c92;
      --accent:#c1592f;
      --accent-text:#fbe6db;
      --brass:#d4a24e;
      --brass-text:#3a2a0d;
      --border:#3d3732;
      --danger:#b84f4f;
      --success:#7aae6a;
      --max-width: 640px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.5;
      padding-bottom: 104px;
    }

    header {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      letter-spacing: 0.08em;
      font-size: 1.6rem;
      margin: 0;
      text-transform: uppercase;
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    nav {
      display: flex;
      overflow-x: auto;
      gap: 0.5rem;
      padding: 1rem 1.25rem 0;
      border-bottom: 1px solid var(--border);
      scrollbar-width: thin;
    }

    .tab {
      flex: 0 0 auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.6rem 0.9rem;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    main {
      padding: 1.25rem;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .day-head {
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 1.1rem;
      margin: 0 0 0.25rem;
    }

    .day-sub {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin: 0 0 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1rem 0.85rem;
      margin-bottom: 1rem;
    }

    .ex-name-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .ex-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .ex-target {
      color: var(--text-dim);
      font-size: 0.78rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .pr-badge {
      background: var(--brass);
      color: var(--brass-text);
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      display: inline-block;
    }

    .last-time,
    .meta-line,
    .hint,
    .save-msg,
    .sync-status {
      color: var(--text-dim);
      font-size: 0.78rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .last-time {
      margin: 0.35rem 0 0.6rem;
    }

    .hint {
      margin-top: 0.35rem;
    }

    .hint strong {
      color: var(--brass);
    }

    .set-row {
      display: grid;
      grid-template-columns: 24px 1fr 42px 1fr 44px 28px;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .set-num {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      text-align: center;
    }

    .set-row input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      padding: 0.45rem 0.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      width: 100%;
      text-align: center;
    }

    .set-row input:focus {
      outline: 1px solid var(--accent);
      border-color: var(--accent);
    }

    .set-row input.invalid {
      border-color: var(--danger);
      outline-color: var(--danger);
    }

    .unit {
      color: var(--text-dim);
      font-size: 0.75rem;
      width: 2.5rem;
    }

    .remove-set {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
    }

    .row-actions,
    .toolbar,
    .sync-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .row-actions {
      margin-top: 0.5rem;
    }

    .btn,
    .add-set,
    .clear-btn,
    .sync-btn,
    .ghost-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 0.45rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .add-set {
      border-style: dashed;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
    }

    .save-btn {
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.9rem;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      flex: 1;
      max-width: var(--max-width);
    }

    .sync-btn.connected {
      border-color: var(--brass);
      color: var(--brass);
    }

    .save-msg {
      text-align: center;
      margin: 0.5rem 0 0;
      min-height: 1.2rem;
    }

    .success { color: var(--success); }
    .warn { color: var(--brass); }
    .danger { color: var(--danger); }

    .tally { display: flex; align-items: center; gap: 8px; }
    .tally-group { position: relative; display: flex; gap: 3px; }
    .tally-line { width: 2px; height: 14px; background: var(--text-dim); }
    .tally-slash {
      position: absolute;
      width: 20px;
      height: 2px;
      background: var(--accent);
      top: 6px;
      left: -2px;
      transform: rotate(-50deg);
    }

    .history-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.75rem;
    }

    .history-date {
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.95rem;
      color: var(--accent);
    }

    .history-day {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-bottom: 0.35rem;
    }

    .history-ex,
    .history-meta {
      font-size: 0.85rem;
      margin: 0.15rem 0;
      font-family: 'JetBrains Mono', monospace;
    }

    .history-meta {
      color: var(--brass);
      margin-top: 0.5rem;
    }

    .empty {
      color: var(--text-dim);
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0.85rem 1.25rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }

    .hidden { display: none !important; }

    @media (max-width: 540px) {
      .set-row {
        grid-template-columns: 24px 1fr 34px 1fr 34px 28px;
        gap: 0.35rem;
      }

      main {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Iron Log</h1>
    <p class="subtitle">Home gym strength &amp; glute-focus tracker — 5 day split</p>
    <div class="sync-bar">
      <button class="sync-btn" id="sync-btn">Connect Google Drive</button>
      <span class="sync-status" id="sync-status"></span>
    </div>
  </header>

  <nav id="nav"></nav>
  <main id="main"></main>
  <footer id="footer"></footer>

  <script>
    const Config = (() => {
      const STORAGE_KEY = 'workout-log';
      const LAST_DAY_KEY = 'workout-log-last-day';
      const DRIVE_CONNECTED_KEY = 'gdrive-connected';
      const GOOGLE_CLIENT_ID = '248806454487-67325c1fla6vq9vom73k4823t5k0p9dc.apps.googleusercontent.com';
      const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
      const DRIVE_FILE_NAME = 'iron-log-history.json';

      const PROGRAM = {
        1: {
          name: 'Lower body A',
          sub: 'Quad & glute focus',
          exercises: [
            { id: 'gs', name: 'Goblet squat', target: '4 x 8-12' },
            { id: 'rdl', name: 'Romanian deadlift', target: '3 x 10-12' },
            { id: 'bss', name: 'Bulgarian split squat', target: '3 x 10-12 / leg' },
            { id: 'wl', name: 'Walking lunge', target: '3 x 12 / leg' },
            { id: 'hth', name: 'Bench hip thrust', target: '3 x 12-15' },
            { id: 'cr', name: 'Standing calf raise', target: '3 x 15-20' }
          ]
        },
        2: {
          name: 'Upper push',
          sub: 'Chest, shoulders & triceps',
          exercises: [
            { id: 'bp', name: 'EZ bar bench press', target: '4 x 6-10' },
            { id: 'shp', name: 'DB shoulder press', target: '3 x 10-12' },
            { id: 'pu', name: 'Push-up (stands)', target: '3 x AMRAP', bw: true },
            { id: 'fly', name: 'DB flye', target: '3 x 12-15' },
            { id: 'lat', name: 'Lateral raise', target: '3 x 12-15' },
            { id: 'sc', name: 'EZ bar skull crusher', target: '3 x 10-12' }
          ]
        },
        3: {
          name: 'Lower body B',
          sub: 'Hamstring & glute focus',
          exercises: [
            { id: 'dl', name: 'DB deadlift', target: '4 x 8-10' },
            { id: 'kbs', name: 'Kettlebell swing', target: '3 x 15-20' },
            { id: 'su', name: 'Step-up (bench)', target: '3 x 10-12 / leg' },
            { id: 'slr', name: 'Single-leg RDL', target: '3 x 10 / leg' },
            { id: 'll', name: 'Lateral lunge', target: '3 x 10-12 / leg' },
            { id: 'pl', name: 'Plank', target: '3 rounds', bw: true }
          ]
        },
        4: {
          name: 'Upper pull',
          sub: 'Back & biceps',
          exercises: [
            { id: 'plu', name: 'Pull-up', target: '4 x AMRAP', bw: true },
            { id: 'row', name: 'Single-arm DB row', target: '3 x 10-12 / side' },
            { id: 'cur', name: 'EZ bar curl', target: '3 x 10-12' },
            { id: 'hc', name: 'Hammer curl', target: '3 x 10-12' },
            { id: 'fp', name: 'Face pull / reverse flye', target: '3 x 15-20' }
          ]
        },
        5: {
          name: 'Full body & glutes',
          sub: 'Mixed accessory day',
          exercises: [
            { id: 'ht2', name: 'Bench hip thrust', target: '4 x 10-15' },
            { id: 'kb2', name: 'Kettlebell swing', target: '3 x 15-20' },
            { id: 'sumo', name: 'KB goblet sumo squat', target: '3 x 10-12' },
            { id: 'slc', name: 'Single-leg calf raise', target: '3 x 15 / leg' },
            { id: 'pu2', name: 'Push-up', target: '3 x AMRAP', bw: true },
            { id: 'fc', name: 'Farmer carry', target: '3 rounds', bw: true }
          ]
        }
      };

      return {
        STORAGE_KEY,
        LAST_DAY_KEY,
        DRIVE_CONNECTED_KEY,
        GOOGLE_CLIENT_ID,
        DRIVE_SCOPE,
        DRIVE_FILE_NAME,
        PROGRAM
      };
    })();

    const Utils = (() => {
      function e1rm(weight, reps) {
        return weight * (1 + reps / 30);
      }

      function escapeHtml(str = '') {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function parsePositiveNumber(value, allowZero = false) {
        if (value === '' || value === null || typeof value === 'undefined') return null;
        const num = Number(value);
        if (!Number.isFinite(num)) return null;
        if (allowZero ? num < 0 : num <= 0) return null;
        return num;
      }

      function todayIso() {
        return new Date().toISOString();
      }

      function uid(prefix = 'id') {
        return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      }

      function renderTally(count) {
        let html = '';
        let remaining = count;
        while (remaining > 0) {
          const n = Math.min(remaining, 5);
          html += '<div class="tally-group">';
          for (let i = 0; i < Math.min(n, 4); i++) html += '<div class="tally-line"></div>';
          if (n === 5) html += '<div class="tally-line"></div><div class="tally-slash"></div>';
          html += '</div>';
          remaining -= n;
        }
        return html;
      }

      function sessionVolume(exerciseSets) {
        return Object.values(exerciseSets).flat().reduce((sum, set) => sum + ((set.weight || 0) * (set.reps || 0)), 0);
      }

      return {
        e1rm,
        escapeHtml,
        parsePositiveNumber,
        todayIso,
        uid,
        renderTally,
        sessionVolume
      };
    })();

    const Store = (() => {
      const hasCloudStorage = typeof window.storage !== 'undefined' && window.storage !== null;

      async function getItem(key, fallback = null) {
        if (hasCloudStorage) {
          try {
            const result = await window.storage.get(key, false);
            if (!result || typeof result.value === 'undefined') return fallback;
            return JSON.parse(result.value);
          } catch {
            return fallback;
          }
        }

        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      async function setItem(key, value) {
        const serialized = JSON.stringify(value);

        if (hasCloudStorage) {
          try {
            await window.storage.set(key, serialized, false);
            return true;
          } catch {
            return false;
          }
        }

        try {
          localStorage.setItem(key, serialized);
          return true;
        } catch {
          return false;
        }
      }

      function setRawLocal(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch {}
      }

      function getRawLocal(key) {
        try {
          return localStorage.getItem(key);
        } catch {
          return null;
        }
      }

      return {
        hasCloudStorage,
        getItem,
        setItem,
        setRawLocal,
        getRawLocal
      };
    })();

    const State = (() => {
      const state = {
        history: [],
        currentDay: 1,
        currentView: 'log',
        rows: {},
        accessToken: null,
        tokenClient: null,
        driveFileId: null,
        syncStatus: '',
        saveMessage: '',
        lastPRs: []
      };

      function get() {
        return state;
      }

      function patch(partial) {
        Object.assign(state, partial);
      }

      function resetRowsForDay(dayId) {
        const nextRows = {};
        Config.PROGRAM[dayId].exercises.forEach(ex => {
          nextRows[ex.id] = [{ weight: '', reps: '' }];
        });
        state.rows = nextRows;
      }

      return {
        get,
        patch,
        resetRowsForDay
      };
    })();

    const HistoryService = (() => {
      async function load() {
        const history = await Store.getItem(Config.STORAGE_KEY, []);
        const persistedDay = Number(Store.getRawLocal(Config.LAST_DAY_KEY));

        State.patch({
          history: Array.isArray(history) ? history : [],
          currentDay: Config.PROGRAM[persistedDay] ? persistedDay : 1
        });

        State.resetRowsForDay(State.get().currentDay);
      }

      async function save() {
        return Store.setItem(Config.STORAGE_KEY, State.get().history);
      }

      function mergeHistories(local, remote) {
        const map = new Map();
        [...local, ...remote]
          .filter(Boolean)
          .forEach(session => {
            const key = session.id || `${session.date}_${session.dayId}`;
            map.set(key, normalizeSession(session));
          });

        return [...map.values()].sort((a, b) => new Date(a.date) - new Date(b.date));
      }

      function normalizeSession(session) {
        return {
          id: session.id || Utils.uid('sess'),
          date: session.date || Utils.todayIso(),
          dayId: Number(session.dayId),
          volume: session.volume || Utils.sessionVolume(session.exercises || {}),
          exercises: session.exercises || {}
        };
      }

      function lastSessionFor(dayId, exerciseId) {
        const history = State.get().history;
        for (let i = history.length - 1; i >= 0; i--) {
          const item = history[i];
          if (item.dayId === dayId && item.exercises[exerciseId]) {
            return item.exercises[exerciseId];
          }
        }
        return null;
      }

      function bestFor(exerciseId) {
        const history = State.get().history;
        let best = null;

        history.forEach(session => {
          const sets = session.exercises[exerciseId];
          if (!sets) return;
          sets.forEach(set => {
            const score = Utils.e1rm(set.weight || 0, set.reps || 0);
            if (!best || score > best.score) {
              best = {
                score,
                weight: set.weight || 0,
                reps: set.reps || 0
              };
            }
          });
        });

        return best;
      }

      async function clear() {
        State.patch({ history: [] });
        return save();
      }

      return {
        load,
        save,
        mergeHistories,
        normalizeSession,
        lastSessionFor,
        bestFor,
        clear
      };
    })();

    const DriveSync = (() => {
      function setStatus(text) {
        State.patch({ syncStatus: text || '' });
        UI.updateSyncStatus();
      }

      function isConnected() {
        return Boolean(State.get().accessToken);
      }

      function rememberConnection() {
        Store.setRawLocal(Config.DRIVE_CONNECTED_KEY, '1');
      }

      function isRemembered() {
        return Store.getRawLocal(Config.DRIVE_CONNECTED_KEY) === '1';
      }

      function clearRememberedConnection() {
        Store.setRawLocal(Config.DRIVE_CONNECTED_KEY, '0');
      }

      function loadGsiScript() {
        return new Promise((resolve, reject) => {
          if (window.google && window.google.accounts) {
            resolve();
            return;
          }

          const script = document.createElement('script');
          script.src = 'https://accounts.google.com/gsi/client';
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      async function ensureTokenClient() {
        await loadGsiScript();
        if (!State.get().tokenClient) {
          const tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: Config.GOOGLE_CLIENT_ID,
            scope: Config.DRIVE_SCOPE,
            callback: ''
          });
          State.patch({ tokenClient });
        }
      }

      function requestToken(prompt = 'consent') {
        return new Promise((resolve, reject) => {
          const { tokenClient } = State.get();
          tokenClient.callback = (response) => {
            if (response.error) {
              reject(response);
              return;
            }

            State.patch({ accessToken: response.access_token });
            resolve(response);
          };
          tokenClient.requestAccessToken({ prompt });
        });
      }

      async function getDriveFileId() {
        const { driveFileId, accessToken } = State.get();
        if (driveFileId) return driveFileId;

        const url = 'https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=' +
          encodeURIComponent(`name='${Config.DRIVE_FILE_NAME}'`);

        const response = await fetch(url, {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        const data = await response.json();
        const foundId = data?.files?.[0]?.id || null;
        State.patch({ driveFileId: foundId });
        return foundId;
      }

      async function readDriveFile() {
        const { accessToken } = State.get();
        const id = await getDriveFileId();
        if (!id) return null;

        const response = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, {
          headers: { Authorization: `Bearer ${accessToken}` }
        });

        if (!response.ok) return null;

        try {
          return await response.json();
        } catch {
          return null;
        }
      }

      async function writeDriveFile(data) {
        const { accessToken } = State.get();
        const id = await getDriveFileId();
        const body = JSON.stringify(data);

        if (id) {
          await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
            method: 'PATCH',
            headers: {
              Authorization: `Bearer ${accessToken}`,
              'Content-Type': 'application/json'
            },
            body
          });
          return;
        }

        const metadata = {
          name: Config.DRIVE_FILE_NAME,
          parents: ['appDataFolder']
        };

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', new Blob([body], { type: 'application/json' }));

        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
          method: 'POST',
          headers: { Authorization: `Bearer ${accessToken}` },
          body: form
        });

        const result = await response.json();
        State.patch({ driveFileId: result.id || null });
      }

      async function sync() {
        setStatus('Syncing...');

        try {
          const remote = await readDriveFile();
          const merged = HistoryService.mergeHistories(State.get().history, Array.isArray(remote) ? remote : []);
          State.patch({ history: merged });
          await HistoryService.save();
          await writeDriveFile(merged);
          setStatus(`Synced ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`);
          UI.render();
        } catch (error) {
          console.error(error);
          setStatus('Sync failed — try again');
        }
      }

      async function autoPush() {
        if (!isConnected()) return;
        try {
          const remote = await readDriveFile();
          const merged = HistoryService.mergeHistories(State.get().history, Array.isArray(remote) ? remote : []);
          State.patch({ history: merged });
          await HistoryService.save();
          await writeDriveFile(merged);
          setStatus(`Synced ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`);
        } catch (error) {
          console.error(error);
          setStatus('Sync failed — will retry next save');
        }
      }

      async function connectOrSync() {
        if (isConnected()) {
          await sync();
          return;
        }

        setStatus('Connecting...');
        try {
          await ensureTokenClient();
          await requestToken('consent');
          rememberConnection();
          await sync();
        } catch (error) {
          console.error(error);
          clearRememberedConnection();
          setStatus('Connection failed — try again');
        }
      }

      async function autoReconnectIfNeeded() {
        if (!isRemembered()) return;

        try {
          await ensureTokenClient();
          await requestToken('none');
          await sync();
        } catch {
          setStatus('Tap to reconnect');
        }
      }

      return {
        setStatus,
        isConnected,
        connectOrSync,
        autoPush,
        writeDriveFile,
        autoReconnectIfNeeded
      };
    })();

    const WorkoutService = (() => {
      function getCurrentProgramDay() {
        return Config.PROGRAM[State.get().currentDay];
      }

      function addSet(exerciseId) {
        const state = State.get();
        state.rows[exerciseId].push({ weight: '', reps: '' });
        UI.render();
      }

      function removeSet(exerciseId, index) {
        const state = State.get();
        if (state.rows[exerciseId].length > 1) {
          state.rows[exerciseId].splice(index, 1);
          UI.render();
        }
      }

      function updateField(exerciseId, index, field, value) {
        const state = State.get();
        const row = state.rows[exerciseId]?.[index];
        if (!row) return;

        if (field === 'weight') {
          if (value === '') row.weight = '';
          else {
            const valid = Utils.parsePositiveNumber(value, true);
            row.weight = valid === null ? value : valid;
          }
          return;
        }

        if (field === 'reps') {
          if (value === '') row.reps = '';
          else {
            const valid = Utils.parsePositiveNumber(value, false);
            row.reps = valid === null ? value : valid;
          }
        }
      }

      function validateRowsForExercise(exerciseId) {
        const rows = State.get().rows[exerciseId] || [];
        return rows.map(row => ({
          weightValid: row.weight === '' || Utils.parsePositiveNumber(row.weight, true) !== null,
          repsValid: row.reps === '' || Utils.parsePositiveNumber(row.reps, false) !== null
        }));
      }

      function buildSessionExerciseMap() {
        const programDay = getCurrentProgramDay();
        const sessionExercises = {};
        const prs = [];
        let anyLogged = false;

        programDay.exercises.forEach(exercise => {
          const cleanedSets = (State.get().rows[exercise.id] || [])
            .map(row => ({
              weight: Utils.parsePositiveNumber(row.weight, true) || 0,
              reps: Utils.parsePositiveNumber(row.reps, false)
            }))
            .filter(set => set.reps !== null && set.reps > 0);

          if (!cleanedSets.length) return;

          anyLogged = true;
          sessionExercises[exercise.id] = cleanedSets;

          const priorBest = HistoryService.bestFor(exercise.id);
          const topThisSession = cleanedSets.reduce((best, current) =>
            Utils.e1rm(current.weight, current.reps) > Utils.e1rm(best.weight, best.reps) ? current : best
          );

          if (!priorBest || Utils.e1rm(topThisSession.weight, topThisSession.reps) > priorBest.score) {
            prs.push(exercise.id);
          }
        });

        return { sessionExercises, prs, anyLogged };
      }

      async function saveWorkout() {
        const { sessionExercises, prs, anyLogged } = buildSessionExerciseMap();

        if (!anyLogged) {
          State.patch({ saveMessage: 'Enter at least one valid set before saving.', lastPRs: [] });
          UI.updateSaveMessage('warn');
          return;
        }

        const session = HistoryService.normalizeSession({
          id: Utils.uid('sess'),
          date: Utils.todayIso(),
          dayId: State.get().currentDay,
          exercises: sessionExercises,
          volume: Utils.sessionVolume(sessionExercises)
        });

        State.get().history.push(session);
        await HistoryService.save();

        State.patch({
          lastPRs: prs,
          saveMessage: prs.length
            ? `Workout saved — new PR on ${prs.length} exercise${prs.length > 1 ? 's' : ''}!`
            : 'Workout saved.'
        });

        State.resetRowsForDay(State.get().currentDay);
        UI.render();
        UI.updateSaveMessage(prs.length ? 'success' : 'warn');

        if (DriveSync.isConnected()) {
          await DriveSync.autoPush();
        }
      }

      async function clearHistory() {
        const confirmed = confirm('This will permanently delete all logged workouts. Continue?');
        if (!confirmed) return;

        await HistoryService.clear();
        State.patch({ saveMessage: '', lastPRs: [] });

        if (DriveSync.isConnected()) {
          try {
            await DriveSync.writeDriveFile([]);
            DriveSync.setStatus(`Synced ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`);
          } catch (error) {
            console.error(error);
            DriveSync.setStatus('Sync failed — will retry next save');
          }
        }

        UI.render();
      }

      function exportHistory() {
        const blob = new Blob([JSON.stringify(State.get().history, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = 'iron-log-backup.json';
        anchor.click();
        URL.revokeObjectURL(url);
      }

      return {
        getCurrentProgramDay,
        addSet,
        removeSet,
        updateField,
        validateRowsForExercise,
        saveWorkout,
        clearHistory,
        exportHistory
      };
    })();

    const UI = (() => {
      function el(id) {
        return document.getElementById(id);
      }

      function updateSyncStatus() {
        const { accessToken, syncStatus } = State.get();
        const button = el('sync-btn');
        const status = el('sync-status');

        if (status) status.textContent = syncStatus || '';
        if (!button) return;

        if (accessToken) {
          button.textContent = 'Sync now';
          button.classList.add('connected');
        } else {
          button.textContent = 'Connect Google Drive';
          button.classList.remove('connected');
        }
      }

      function updateSaveMessage(className = 'warn') {
        const node = el('save-msg');
        if (!node) return;
        node.className = `save-msg ${className}`;
        node.textContent = State.get().saveMessage || '';
      }

      function renderNav() {
        const nav = el('nav');
        const { currentDay, currentView } = State.get();

        nav.innerHTML = `
          ${Object.keys(Config.PROGRAM).map(dayId => `
            <button class="tab ${currentView === 'log' && currentDay === Number(dayId) ? 'active' : ''}" data-action="select-day" data-day="${dayId}">
              ${String(dayId).padStart(2, '0')} ${Utils.escapeHtml(Config.PROGRAM[dayId].name)}
            </button>
          `).join('')}
          <button class="tab ${currentView === 'history' ? 'active' : ''}" data-action="select-history">History</button>
        `;
      }

      function renderLogView() {
        const main = el('main');
        const footer = el('footer');
        const state = State.get();
        const day = Config.PROGRAM[state.currentDay];

        const html = `
          <div class="toolbar">
            <div>
              <h2 class="day-head">${String(state.currentDay).padStart(2, '0')} ${Utils.escapeHtml(day.name)}</h2>
              <p class="day-sub">${Utils.escapeHtml(day.sub)}</p>
            </div>
            <button class="ghost-btn" data-action="export-history">Export</button>
          </div>

          ${day.exercises.map(exercise => renderExerciseCard(exercise, state.currentDay)).join('')}
          <p class="save-msg" id="save-msg"></p>
        `;

        main.innerHTML = html;
        footer.innerHTML = `<button class="save-btn" data-action="save-workout">Save workout</button>`;
        updateSaveMessage(State.get().lastPRs.length ? 'success' : 'warn');
      }

      function renderExerciseCard(exercise, dayId) {
        const rows = State.get().rows[exercise.id] || [];
        const validation = WorkoutService.validateRowsForExercise(exercise.id);
        const lastSession = HistoryService.lastSessionFor(dayId, exercise.id);
        const best = HistoryService.bestFor(exercise.id);
        const showPR = State.get().lastPRs.includes(exercise.id);

        let lastText = 'No previous session logged';
        if (lastSession?.length) {
          lastText = 'Last time: ' + lastSession
            .map(set => exercise.bw
              ? `${set.reps} reps${set.weight ? ` +${set.weight}lb` : ''}`
              : `${set.weight}lb x ${set.reps}`)
            .join(', ');
        }

        const hint = best
          ? `Best est. 1RM: <strong>${best.score.toFixed(1)}lb</strong>${best.weight || best.reps ? ` (${best.weight} x ${best.reps})` : ''}`
          : 'No PR yet';

        return `
          <section class="card">
            <div class="ex-name-row">
              <span class="ex-name">${Utils.escapeHtml(exercise.name)}</span>
              ${showPR ? '<span class="pr-badge">PR</span>' : ''}
              <span class="ex-target">${Utils.escapeHtml(exercise.target)}</span>
            </div>
            <p class="last-time">${Utils.escapeHtml(lastText)}</p>
            <p class="hint">${hint}</p>

            ${rows.map((row, index) => `
              <div class="set-row">
                <span class="set-num">${index + 1}</span>
                <input
                  type="number"
                  step="2.5"
                  inputmode="decimal"
                  placeholder="${exercise.bw ? 'added wt' : 'weight'}"
                  value="${row.weight}"
                  data-action="update-field"
                  data-exercise-id="${exercise.id}"
                  data-index="${index}"
                  data-field="weight"
                  class="${validation[index]?.weightValid ? '' : 'invalid'}"
                />
                <span class="unit">lb</span>
                <input
                  type="number"
                  inputmode="numeric"
                  placeholder="reps"
                  value="${row.reps}"
                  data-action="update-field"
                  data-exercise-id="${exercise.id}"
                  data-index="${index}"
                  data-field="reps"
                  class="${validation[index]?.repsValid ? '' : 'invalid'}"
                />
                <span class="unit">reps</span>
                <button class="remove-set" data-action="remove-set" data-exercise-id="${exercise.id}" data-index="${index}" aria-label="Remove set">&times;</button>
              </div>
            `).join('')}

            <div class="row-actions">
              <button class="add-set" data-action="add-set" data-exercise-id="${exercise.id}">+ Add set</button>
              <div class="tally">${Utils.renderTally(rows.filter(r => r.weight !== '' || r.reps !== '').length)}</div>
            </div>
          </section>
        `;
      }

      function renderHistoryView() {
        const main = el('main');
        const footer = el('footer');
        const history = [...State.get().history].reverse();

        if (!history.length) {
          main.innerHTML = `
            <h2 class="day-head">History</h2>
            <p class="empty">No sessions logged yet. Log your first workout from the day tabs above.</p>
          `;
          footer.innerHTML = '';
          return;
        }

        main.innerHTML = `
          <div class="toolbar">
            <h2 class="day-head">History</h2>
            <div class="toolbar">
              <button class="ghost-btn" data-action="export-history">Export</button>
              <button class="clear-btn" data-action="clear-history">Clear all history</button>
            </div>
          </div>
          ${history.map(renderHistoryEntry).join('')}
        `;

        footer.innerHTML = '';
      }

      function renderHistoryEntry(session) {
        const day = Config.PROGRAM[session.dayId];
        const dateText = new Date(session.date).toLocaleDateString(undefined, {
          weekday: 'short',
          month: 'short',
          day: 'numeric'
        });

        return `
          <article class="history-entry">
            <div class="history-date">${Utils.escapeHtml(dateText)}</div>
            <div class="history-day">${String(session.dayId).padStart(2, '0')} ${Utils.escapeHtml(day?.name || 'Unknown')}</div>
            ${day?.exercises.map(exercise => {
              const sets = session.exercises[exercise.id];
              if (!sets?.length) return '';
              const text = sets.map(set => exercise.bw
                ? `${set.reps}${set.weight ? ` +${set.weight}lb` : ''}`
                : `${set.weight}x${set.reps}`
              ).join(', ');
              return `<div class="history-ex">${Utils.escapeHtml(exercise.name)}: ${Utils.escapeHtml(text)}</div>`;
            }).join('') || ''}
            <div class="history-meta">Volume: ${Number(session.volume || 0).toLocaleString()} lb</div>
          </article>
        `;
      }

      function render() {
        renderNav();
        if (State.get().currentView === 'history') renderHistoryView();
        else renderLogView();
        updateSyncStatus();
      }

      return {
        render,
        updateSyncStatus,
        updateSaveMessage
      };
    })();

    const Actions = (() => {
      function selectDay(dayId) {
        const numericDay = Number(dayId);
        if (!Config.PROGRAM[numericDay]) return;

        State.patch({
          currentDay: numericDay,
          currentView: 'log',
          saveMessage: '',
          lastPRs: []
        });
        State.resetRowsForDay(numericDay);
        Store.setRawLocal(Config.LAST_DAY_KEY, String(numericDay));
        UI.render();
      }

      function selectHistory() {
        State.patch({ currentView: 'history', saveMessage: '', lastPRs: [] });
        UI.render();
      }

      async function handleClick(event) {
        const target = event.target.closest('[data-action]');
        if (!target) return;

        const action = target.dataset.action;

        switch (action) {
          case 'select-day':
            selectDay(target.dataset.day);
            break;
          case 'select-history':
            selectHistory();
            break;
          case 'add-set':
            WorkoutService.addSet(target.dataset.exerciseId);
            break;
          case 'remove-set':
            WorkoutService.removeSet(target.dataset.exerciseId, Number(target.dataset.index));
            break;
          case 'save-workout':
            await WorkoutService.saveWorkout();
            break;
          case 'clear-history':
            await WorkoutService.clearHistory();
            break;
          case 'export-history':
            WorkoutService.exportHistory();
            break;
          default:
            break;
        }
      }

      function handleInput(event) {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (target.dataset.action !== 'update-field') return;

        WorkoutService.updateField(
          target.dataset.exerciseId,
          Number(target.dataset.index),
          target.dataset.field,
          target.value
        );
      }

      async function handleSyncButtonClick() {
        await DriveSync.connectOrSync();
      }

      return {
        handleClick,
        handleInput,
        handleSyncButtonClick
      };
    })();

    async function init() {
      await HistoryService.load();
      UI.render();
      document.addEventListener('click', Actions.handleClick);
      document.addEventListener('input', Actions.handleInput);
      document.getElementById('sync-btn').addEventListener('click', Actions.handleSyncButtonClick);
      await DriveSync.autoReconnectIfNeeded();
    }

    init();
  </script>
</body>
</html>
