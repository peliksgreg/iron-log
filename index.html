<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=JetBrains+Mono:wght@500&display=swap');

  :root{
    --bg:#1c1a18;
    --surface:#262320;
    --surface-2:#312c28;
    --text:#f1ece2;
    --text-dim:#a39c92;
    --accent:#c1592f;
    --accent-text:#fbe6db;
    --brass:#d4a24e;
    --brass-text:#3a2a0d;
    --border:#3d3732;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height:1.5;
    padding-bottom:90px;
  }

  header{
    padding:1.5rem 1.25rem 1rem;
    border-bottom:1px solid var(--border);
  }

  h1{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    letter-spacing:0.08em;
    font-size:1.6rem;
    margin:0;
    text-transform:uppercase;
    color:var(--accent);
  }

  .subtitle{ color:var(--text-dim); font-size:0.85rem; margin-top:0.25rem; cursor:pointer; }
  .subtitle:hover{ color:var(--text); }

  .header-edit-row{ display:flex; align-items:center; gap:0.5rem; }
  .header-edit-btn{
    background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1rem;
    padding:0.1rem 0.3rem; line-height:1; opacity:0.7;
  }
  .header-edit-btn:hover{ opacity:1; color:var(--brass); }

  h1[contenteditable="true"], .subtitle[contenteditable="true"]{
    outline:1px dashed var(--brass);
    border-radius:4px;
    padding:0.1rem 0.3rem;
    cursor:text;
  }

  .sync-bar{ display:flex; align-items:center; gap:0.6rem; margin-top:0.75rem; flex-wrap:wrap; }

  .sync-btn{
    background:none; border:1px solid var(--border); color:var(--text-dim);
    border-radius:6px; padding:0.4rem 0.8rem; font-size:0.78rem; cursor:pointer;
  }
  .sync-btn.connected{ border-color:var(--brass); color:var(--brass); }
  .sync-status{ font-size:0.75rem; color:var(--text-dim); font-family:'JetBrains Mono', monospace; }

  nav{
    display:flex; overflow-x:auto; gap:0.5rem;
    padding:1rem 1.25rem 0; border-bottom:1px solid var(--border);
  }

  .tab{
    flex:0 0 auto; background:none; border:1px solid var(--border); color:var(--text-dim);
    font-family:'Oswald', sans-serif; font-size:0.8rem; letter-spacing:0.05em; text-transform:uppercase;
    padding:0.6rem 0.9rem; border-radius:6px 6px 0 0; cursor:pointer; white-space:nowrap;
  }
  .tab.active{ color:var(--bg); background:var(--accent); border-color:var(--accent); }
  .tab.edit-tab{ color:var(--brass); border-color:var(--brass); margin-left:auto; }
  .tab.edit-tab.active{ background:var(--brass); color:var(--brass-text); }

  main{ padding:1.25rem; max-width:640px; margin:0 auto; }

  .day-head-row{ display:flex; align-items:baseline; justify-content:space-between; gap:0.5rem; }
  .day-head{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.05em; font-size:1.1rem; margin:0 0 0.25rem; }
  .day-sub{ color:var(--text-dim); font-size:0.85rem; margin:0 0 1.25rem; }
  .edit-link{ background:none; border:none; color:var(--text-dim); font-size:0.78rem; cursor:pointer; text-decoration:underline; }

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:1rem 1rem 0.85rem; margin-bottom:1rem;
  }

  .ex-name-row{ display:flex; align-items:baseline; justify-content:space-between; gap:0.5rem; }
  .ex-name{ font-weight:600; font-size:1rem; }
  .ex-target{ color:var(--text-dim); font-size:0.78rem; font-family:'JetBrains Mono', monospace; }

  .pr-badge{
    background:var(--brass); color:var(--brass-text); font-family:'Oswald', sans-serif;
    font-size:0.7rem; letter-spacing:0.08em; padding:0.15rem 0.5rem; border-radius:4px;
    text-transform:uppercase; display:none;
  }

  .last-time{ color:var(--text-dim); font-size:0.78rem; margin:0.35rem 0 0.6rem; font-family:'JetBrains Mono', monospace; }

  .set-row{ display:flex; align-items:center; gap:0.5rem; margin-bottom:0.4rem; }
  .set-num{ width:1.4rem; color:var(--text-dim); font-family:'JetBrains Mono', monospace; font-size:0.8rem; text-align:center; }
  .set-row input{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:5px;
    padding:0.45rem 0.5rem; font-family:'JetBrains Mono', monospace; font-size:0.9rem; width:100%; text-align:center;
  }
  .set-row input:focus{ outline:1px solid var(--accent); border-color:var(--accent); }
  .unit{ color:var(--text-dim); font-size:0.75rem; width:2.5rem; }
  .remove-set{ background:none; border:none; color:var(--text-dim); font-size:1.1rem; cursor:pointer; padding:0 0.25rem; line-height:1; }

  .row-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem; }
  .add-set{ background:none; border:1px dashed var(--border); color:var(--text-dim); border-radius:5px; padding:0.35rem 0.7rem; font-size:0.78rem; cursor:pointer; }

  .tally{ display:flex; align-items:center; gap:8px; }
  .tally-group{ position:relative; display:flex; gap:3px; }
  .tally-line{ width:2px; height:14px; background:var(--text-dim); }
  .tally-slash{ position:absolute; width:20px; height:2px; background:var(--accent); top:6px; left:-2px; transform:rotate(-50deg); }

  footer{
    position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border);
    padding:0.85rem 1.25rem; display:flex; gap:0.75rem; justify-content:center;
  }
  footer:empty{
    padding:0; border-top:none; pointer-events:none; min-height:0;
  }
  .save-btn{
    background:var(--accent); color:var(--accent-text); border:none; font-family:'Oswald', sans-serif;
    text-transform:uppercase; letter-spacing:0.08em; font-size:0.9rem; padding:0.75rem 1.5rem;
    border-radius:6px; cursor:pointer; flex:1; max-width:640px;
  }
  .cancel-btn{
    background:none; color:var(--text-dim); border:1px solid var(--border); font-family:'Oswald', sans-serif;
    text-transform:uppercase; letter-spacing:0.08em; font-size:0.9rem; padding:0.75rem 1.25rem;
    border-radius:6px; cursor:pointer; flex:0 0 auto;
  }
  .save-msg{ text-align:center; color:var(--brass); font-size:0.85rem; margin:0.5rem 0 0; font-family:'JetBrains Mono', monospace; min-height:1.2rem; }

  .history-entry{ background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.85rem 1rem; margin-bottom:0.75rem; }
  .history-date{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.05em; font-size:0.95rem; color:var(--accent); }
  .history-day{ color:var(--text-dim); font-size:0.8rem; margin-bottom:0.5rem; }
  .history-ex{ font-size:0.85rem; margin:0.15rem 0; font-family:'JetBrains Mono', monospace; }

  .history-actions{ display:flex; gap:0.5rem; margin-top:0.6rem; }
  .history-action-btn{
    background:none; border:1px solid var(--border); color:var(--text-dim);
    border-radius:5px; padding:0.3rem 0.65rem; font-size:0.72rem; cursor:pointer;
  }
  .history-action-btn:hover{ color:var(--text); }
  .history-action-btn.danger:hover{ color:var(--accent); border-color:var(--accent); }

  .history-edit-row{ display:flex; align-items:center; gap:0.5rem; margin:0.3rem 0; }
  .history-edit-ex-name{ font-size:0.82rem; font-family:'JetBrains Mono', monospace; flex:0 0 auto; min-width:90px; }
  .history-edit-row input{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:5px;
    padding:0.35rem 0.5rem; font-family:'JetBrains Mono', monospace; font-size:0.82rem; width:65px; text-align:center;
  }
  .history-edit-unit{ color:var(--text-dim); font-size:0.72rem; }
  .history-edit-setnum{ color:var(--text-dim); font-size:0.72rem; width:1.2rem; }
  .history-edit-actions{ display:flex; gap:0.5rem; margin-top:0.75rem; }
  .history-save-btn{
    background:var(--accent); color:var(--accent-text); border:none; border-radius:5px;
    padding:0.4rem 0.9rem; font-size:0.78rem; cursor:pointer; font-family:'Oswald', sans-serif;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .history-cancel-btn{
    background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:5px;
    padding:0.4rem 0.9rem; font-size:0.78rem; cursor:pointer;
  }

  .empty{ color:var(--text-dim); text-align:center; padding:2rem 1rem; font-size:0.9rem; }

  .clear-btn{
    display:block; margin:1.5rem auto 0; background:none; border:1px solid var(--border); color:var(--text-dim);
    border-radius:6px; padding:0.5rem 1rem; font-size:0.8rem; cursor:pointer;
  }

  /* --- Edit mode --- */
  .day-pills{ display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.75rem; margin-bottom:1rem; border-bottom:1px solid var(--border); }
  .day-pill{
    flex:0 0 auto; display:flex; align-items:center; gap:0.4rem; background:var(--surface);
    border:1px solid var(--border); border-radius:6px; padding:0.5rem 0.7rem; cursor:grab;
  }
  .day-pill.editing{ border-color:var(--brass); }
  .day-pill .drag-handle{ color:var(--text-dim); cursor:grab; font-size:0.9rem; user-select:none; }
  .day-pill input{
    background:none; border:none; color:var(--text); font-family:'Oswald', sans-serif; font-size:0.85rem;
    text-transform:uppercase; letter-spacing:0.04em; width:9ch; min-width:0;
  }
  .day-pill input:focus{ outline:none; border-bottom:1px solid var(--brass); }
  .day-pill .del-day{ background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1rem; line-height:1; }
  .add-day-pill{
    flex:0 0 auto; background:none; border:1px dashed var(--border); color:var(--text-dim);
    border-radius:6px; padding:0.5rem 0.9rem; font-size:0.8rem; cursor:pointer;
  }

  .day-sub-edit{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    border-radius:5px; padding:0.4rem 0.6rem; font-size:0.82rem; margin-bottom:1rem;
  }

  .ex-edit-card{
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:0.75rem 0.85rem; margin-bottom:0.6rem; display:flex; align-items:flex-start; gap:0.6rem;
  }
  .ex-edit-card.dragging{ opacity:0.4; }
  .drag-handle-ex{ color:var(--text-dim); cursor:grab; padding-top:0.4rem; user-select:none; font-size:1rem; }
  .ex-edit-fields{ flex:1; display:flex; flex-direction:column; gap:0.45rem; }
  .ex-edit-fields input{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:5px;
    padding:0.45rem 0.6rem; font-size:0.85rem; width:100%;
  }
  .ex-edit-row2{ display:flex; gap:0.5rem; align-items:center; }
  .ex-edit-row2 input{ flex:1; font-family:'JetBrains Mono', monospace; font-size:0.8rem; }
  .bw-toggle{ display:flex; align-items:center; gap:0.35rem; font-size:0.75rem; color:var(--text-dim); white-space:nowrap; }
  .del-ex{ background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1.1rem; padding-top:0.4rem; }

  .add-ex-btn{
    width:100%; background:none; border:1px dashed var(--border); color:var(--text-dim);
    border-radius:6px; padding:0.6rem; font-size:0.82rem; cursor:pointer; margin-top:0.4rem;
  }

  .unit-toggle{
    display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden;
    margin-left:auto;
  }
  .unit-opt{
    background:none; border:none; color:var(--text-dim); font-family:'JetBrains Mono', monospace;
    font-size:0.78rem; padding:0.4rem 0.7rem; cursor:pointer;
  }
  .unit-opt.active{ background:var(--brass); color:var(--brass-text); }

  /* --- Wizard --- */
  .wizard-card{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:1.5rem 1.25rem; margin-bottom:1rem;
  }
  .wizard-progress{
    display:flex; gap:0.4rem; margin-bottom:1.25rem;
  }
  .wizard-progress-seg{
    flex:1; height:4px; border-radius:2px; background:var(--surface-2);
  }
  .wizard-progress-seg.done{ background:var(--brass); }
  .wizard-progress-seg.current{ background:var(--accent); }

  .wizard-q{
    font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.04em;
    font-size:1.05rem; margin:0 0 0.3rem;
  }
  .wizard-hint{ color:var(--text-dim); font-size:0.82rem; margin:0 0 1.1rem; }

  .wizard-options{ display:flex; flex-direction:column; gap:0.6rem; }
  .wizard-opt{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:0.75rem 1rem; font-size:0.92rem; text-align:left; cursor:pointer;
  }
  .wizard-opt.selected{ border-color:var(--accent); background:rgba(193,89,47,0.15); }
  .wizard-opt-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; }

  .wizard-nav{ display:flex; justify-content:space-between; margin-top:1.5rem; gap:0.75rem; }
  .wizard-back{
    background:none; border:1px solid var(--border); color:var(--text-dim);
    border-radius:6px; padding:0.65rem 1.1rem; font-size:0.85rem; cursor:pointer;
  }
  .wizard-next{
    background:var(--accent); color:var(--accent-text); border:none;
    border-radius:6px; padding:0.65rem 1.4rem; font-size:0.85rem; cursor:pointer;
    font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.05em;
  }
  .wizard-next:disabled{ opacity:0.4; cursor:not-allowed; }
  .wizard-skip{
    display:block; margin:0.85rem auto 0; background:none; border:none; color:var(--text-dim);
    font-size:0.78rem; text-decoration:underline; cursor:pointer;
  }

  .wizard-preview-day{
    background:var(--surface-2); border:1px solid var(--border); border-radius:8px;
    padding:0.75rem 0.9rem; margin-bottom:0.6rem;
  }
  .wizard-preview-day-name{ font-family:'Oswald', sans-serif; text-transform:uppercase; font-size:0.85rem; letter-spacing:0.04em; color:var(--brass); margin-bottom:0.4rem; }
  .wizard-preview-ex{ font-size:0.82rem; color:var(--text-dim); margin:0.15rem 0; }

  .personalize-tab{ color:var(--brass); }

  /* --- Loading screen --- */
  .loading-screen{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:3.5rem 1.5rem; text-align:center; min-height:50vh;
  }
  .loading-spinner{
    width:54px; height:54px; border-radius:50%;
    border:4px solid var(--surface-2); border-top-color:var(--accent);
    animation:spin 0.9s linear infinite; margin-bottom:1.75rem;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading-text{
    font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.04em;
    font-size:1.05rem; color:var(--brass); min-height:2.6em; max-width:380px;
    transition:opacity 0.3s ease;
  }
  .loading-text.fading{ opacity:0; }
  .loading-sub{ color:var(--text-dim); font-size:0.8rem; margin-top:1.25rem; font-family:'JetBrains Mono', monospace; }

  .week-summary{
    display:flex; align-items:center; justify-content:space-between; gap:0.75rem;
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:0.75rem 1rem; margin-bottom:1.25rem;
  }
  .week-summary-text{ font-size:0.85rem; color:var(--text-dim); }
  .week-summary-count{ color:var(--brass); font-family:'JetBrains Mono', monospace; font-weight:600; }
  .week-dots{ display:flex; gap:0.4rem; }
  .week-dot{
    width:10px; height:10px; border-radius:50%; background:var(--surface-2);
    border:1px solid var(--border); display:inline-block;
  }
  .week-dot.done{ background:var(--brass); border-color:var(--brass); }

  /* --- Exercise demo modal --- */
  .demo-btn{
    background:none; border:1px solid var(--border); color:var(--text-dim);
    border-radius:5px; padding:0.25rem 0.6rem; font-size:0.72rem; cursor:pointer;
    flex:0 0 auto;
  }
  .demo-btn:hover{ color:var(--brass); border-color:var(--brass); }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999;
    display:flex; align-items:flex-end; justify-content:center;
    animation:fadeIn 0.18s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }

  .modal{
    background:var(--surface); border-radius:14px 14px 0 0; width:100%; max-width:640px;
    max-height:90vh; overflow-y:auto; padding:1.25rem 1.25rem 2rem;
    animation:slideUp 0.22s ease;
  }
  @keyframes slideUp{ from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal-header{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1rem; }
  .modal-title{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.05em; font-size:1.1rem; margin:0; }
  .modal-close{
    background:none; border:none; color:var(--text-dim); font-size:1.5rem; cursor:pointer;
    line-height:1; padding:0 0.25rem;
  }

  .modal-demo-body{ padding:0.5rem 0 0.25rem; }
  .modal-demo-hint{ color:var(--text-dim); font-size:0.82rem; margin:0 0 1rem; }
  .modal-yt-btn{
    display:flex; align-items:center; justify-content:center; gap:0.5rem;
    background:var(--accent); color:var(--accent-text); text-decoration:none;
    border-radius:8px; padding:0.9rem 1.25rem; font-family:'Oswald', sans-serif;
    font-size:0.95rem; text-transform:uppercase; letter-spacing:0.05em;
    text-align:center; margin-bottom:1.25rem;
  }
  .modal-yt-btn:hover{ opacity:0.9; }
  .modal-demo-tip{ color:var(--text-dim); font-size:0.78rem; margin:0; font-style:italic; }

  .modal-img-wrap{
    width:100%; background:var(--surface-2); border-radius:8px;
    overflow:hidden; margin-bottom:0.75rem; max-height:340px;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-img{ width:100%; height:auto; max-height:340px; object-fit:contain; display:block; }
  .modal-img-caption{ color:var(--text-dim); font-size:0.75rem; margin:0; font-style:italic; text-align:center; }
  .modal-img-error{ color:var(--text-dim); font-size:0.82rem; padding:1.5rem; text-align:center; }

  .modal-muscles{ display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
  .muscle-tag{
    background:rgba(193,89,47,0.15); color:var(--accent); border:1px solid rgba(193,89,47,0.3);
    border-radius:4px; padding:0.2rem 0.55rem; font-size:0.72rem; font-family:'JetBrains Mono', monospace;
  }
  .muscle-tag.secondary{ background:var(--surface-2); color:var(--text-dim); border-color:var(--border); }

  .modal-instructions-title{
    font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.05em;
    font-size:0.85rem; color:var(--text-dim); margin:0 0 0.6rem;
  }
  .modal-step{ display:flex; gap:0.75rem; margin-bottom:0.6rem; font-size:0.85rem; line-height:1.5; }
  .modal-step-num{
    flex:0 0 auto; width:1.4rem; height:1.4rem; background:var(--accent); color:var(--accent-text);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:0.7rem; font-family:'Oswald', sans-serif; margin-top:0.1rem;
  }
  .modal-not-found{ color:var(--text-dim); font-size:0.85rem; text-align:center; padding:1.5rem 0; }
  .modal-yt-link{
    display:block; margin:0.75rem auto 0; background:none; border:1px solid var(--border);
    color:var(--text-dim); border-radius:6px; padding:0.5rem 1rem; font-size:0.8rem; cursor:pointer;
    text-decoration:none; text-align:center; width:fit-content;
  }
  .modal-yt-link:hover{ color:var(--text); }

  .suggestion{
    font-size:0.78rem; margin:0 0 0.6rem; padding:0.4rem 0.6rem; border-radius:5px;
    font-family:'JetBrains Mono', monospace;
  }
  .suggestion-add-weight{ background:rgba(212,162,78,0.12); color:var(--brass); }
  .suggestion-stall{ background:rgba(193,89,47,0.12); color:var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-edit-row">
    <h1 id="app-title" onclick="startHeaderEdit('title')">Iron log</h1>
    <button class="header-edit-btn" id="header-edit-btn" onclick="startHeaderEdit('title')" aria-label="Edit header">&#9998;</button>
  </div>
  <p class="subtitle" id="app-subtitle" onclick="startHeaderEdit('subtitle')">Your program, your edits, tracked every session</p>
  <div class="sync-bar">
    <button class="sync-btn" id="sync-btn" onclick="handleSyncClick()">Connect Google Drive</button>
    <span class="sync-status" id="sync-status"></span>
    <div class="unit-toggle" id="unit-toggle">

function exerciseFitsEquipment(ex, available){
  if(ex.equipment.length === 0) return true;
  return ex.equipment.every(eq => available.includes(eq));
}

function pickExercisesForDay(muscles, equipment, goal, focusMuscle, usedNamesByMuscle, perMuscleCount){
  const picks = [];
  muscles.forEach(muscle => {
    const usedForThisMuscle = usedNamesByMuscle.get(muscle) || new Set();
    let candidates = EXERCISE_DB.filter(ex =>
      ex.muscle === muscle &&
      exerciseFitsEquipment(ex, equipment) &&
      ex.goalFit.includes(goal) &&
      !usedForThisMuscle.has(ex.name)
    );
    if(candidates.length === 0){
      candidates = EXERCISE_DB.filter(ex =>
        ex.muscle === muscle &&
        exerciseFitsEquipment(ex, equipment) &&
        ex.goalFit.includes(goal)
      );
    }
    const patternPriority = { squat:0, hinge:0, push:0, pull:0, lunge:1, carry:1, isolation:2, core:2, conditioning:2 };
    candidates.sort((a,b) => (patternPriority[a.pattern]??3) - (patternPriority[b.pattern]??3));

    const count = (focusMuscle && muscle === focusMuscle) ? perMuscleCount + 1 : perMuscleCount;
    candidates.slice(0, count).forEach(ex => {
      picks.push(ex);
      usedForThisMuscle.add(ex.name);
    });
    usedNamesByMuscle.set(muscle, usedForThisMuscle);
  });
  return picks;
}

function generatePersonalizedProgram({ daysPerWeek, goal, equipment, focusMuscle, experience }){
  const template = SPLIT_TEMPLATES[daysPerWeek] || SPLIT_TEMPLATES[4];
  const perMuscleCount = experience === 'beginner' ? 1 : 2;
  const usedNamesByMuscle = new Map();

  return template.map((day, idx) => {
    const exercises = pickExercisesForDay(day.muscles, equipment, goal, focusMuscle, usedNamesByMuscle, perMuscleCount);
    return {
      id: uid('d'),
      name: day.name,
      sub: day.muscles.join(', '),
      exercises: exercises.map(ex => ({
        id: uid('ex'),
        name: ex.name,
        target: ex.target,
        bw: ex.bw
      }))
    };
  });
}

function lbToKg(lb){ return lb / 2.20462; }
function kgToLb(kg){ return kg * 2.20462; }

function toDisplayWeight(lbValue){
  if(lbValue === '' || lbValue === null || lbValue === undefined) return '';
  const n = Number(lbValue);
  if(isNaN(n)) return '';
  const converted = weightUnit === 'kg' ? lbToKg(n) : n;
  return Math.round(converted * 10) / 10;
}

function fromDisplayWeight(displayValue){
  if(displayValue === '' || displayValue === null || displayValue === undefined) return '';
  const n = Number(displayValue);
  if(isNaN(n)) return '';
  const lb = weightUnit === 'kg' ? kgToLb(n) : n;
  return Math.round(lb * 10) / 10;
}

function startHeaderEdit(which){
  const el = document.getElementById(which === 'title' ? 'app-title' : 'app-subtitle');
  if(!el || el.getAttribute('contenteditable') === 'true') return;

  el.setAttribute('contenteditable', 'true');
  el.focus();
  document.execCommand('selectAll', false, null);

  const finish = async (commit) => {
    el.removeEventListener('blur', onBlur);
    el.removeEventListener('keydown', onKeydown);
    el.setAttribute('contenteditable', 'false');
    if(commit){
      const newText = el.textContent.trim();
      if(which === 'title'){
        appHeader.title = newText || DEFAULT_HEADER.title;
      }else{
        appHeader.subtitle = newText;
      }
      renderHeader();
      await saveHeader();
      if(accessToken) await autoPushToDrive();
    }else{
      renderHeader();
    }
  };

  function onBlur(){ finish(true); }
  function onKeydown(e){
    if(e.key === 'Enter'){ e.preventDefault(); el.blur(); }
    if(e.key === 'Escape'){ e.preventDefault(); finish(false); }
  }

  el.addEventListener('blur', onBlur);
  el.addEventListener('keydown', onKeydown);
}

const GOOGLE_CLIENT_ID = '248806454487-67325c1fla6vq9vom73k4823t5k0p9dc.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_HISTORY_FILE = 'iron-log-history.json';
const DRIVE_PROGRAM_FILE = 'iron-log-program.json';
const DRIVE_HEADER_FILE = 'iron-log-header.json';

let accessToken = null;
let tokenClient = null;
let driveFileIds = {};

function loadGsiScript(){
  return new Promise((resolve, reject) => {
    if(window.google && window.google.accounts){ resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function ensureTokenClient(){
  await loadGsiScript();
  if(!tokenClient){
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: ''
    });
  }
}

function requestToken(prompt){
  return new Promise((resolve, reject) => {
    tokenClient.callback = (resp) => {
      if(resp.error){ reject(resp); return; }
      accessToken = resp.access_token;
      resolve(resp);
    };
    tokenClient.requestAccessToken({ prompt });
  });
}

function setSyncStatus(text){
  const el = document.getElementById('sync-status');
  if(el) el.textContent = text;
  const btn = document.getElementById('sync-btn');
  if(btn){
    if(accessToken){ btn.textContent = 'Sync now'; btn.classList.add('connected'); }
    else{ btn.textContent = 'Connect Google Drive'; btn.classList.remove('connected'); }
  }
}

async function getDriveFileId(filename){
  if(driveFileIds[filename]) return driveFileIds[filename];
  const res = await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=' + encodeURIComponent("name='"+filename+"'"), {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  const data = await res.json();
  if(data.files && data.files.length) driveFileIds[filename] = data.files[0].id;
  return driveFileIds[filename];
}

async function readDriveFile(filename){
  const id = await getDriveFileId(filename);
  if(!id) return null;
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  if(!res.ok) return null;
  try{ return await res.json(); }catch(e){ return null; }
}

async function writeDriveFile(filename, data){
  const id = await getDriveFileId(filename);
  const body = JSON.stringify(data);
  if(id){
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
      method:'PATCH',
      headers:{ 'Authorization':'Bearer '+accessToken, 'Content-Type':'application/json' },
      body
    });
  }else{
    const metadata = { name: filename, parents:['appDataFolder'] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
    form.append('file', new Blob([body], {type:'application/json'}));
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
      method:'POST', headers:{ 'Authorization':'Bearer '+accessToken }, body: form
    });
    const result = await res.json();
    driveFileIds[filename] = result.id;
  }
}

function mergeHistories(a, b){
  const map = new Map();
  [...a, ...b].forEach(sess => map.set(sess.id || sess.date, sess));
  return [...map.values()].sort((x,y) => new Date(x.date) - new Date(y.date));
}

async function syncWithDrive(){
  setSyncStatus('Syncing...');
  try{
    const remoteHist = await readDriveFile(DRIVE_HISTORY_FILE);
    history = mergeHistories(history, remoteHist || []);
    await saveHistory();
    await writeDriveFile(DRIVE_HISTORY_FILE, history);

    const remoteProgram = await readDriveFile(DRIVE_PROGRAM_FILE);
    if(remoteProgram && remoteProgram.length && (!localStorage.getItem('program-edited-since-sync'))){
      program = remoteProgram;
      await saveProgram();
    }else{
      await writeDriveFile(DRIVE_PROGRAM_FILE, program);
    }

    const remoteHeader = await readDriveFile(DRIVE_HEADER_FILE);
    if(remoteHeader && remoteHeader.title && (!localStorage.getItem('program-edited-since-sync'))){
      appHeader = remoteHeader;
      await saveHeader();
    }else{
      await writeDriveFile(DRIVE_HEADER_FILE, appHeader);
    }

    localStorage.removeItem('program-edited-since-sync');

    setSyncStatus('Synced just now');
    renderHeader();
    render();
  }catch(e){
    console.error(e);
    setSyncStatus('Sync failed — try again');
  }
}

async function autoPushToDrive(){
  if(!accessToken) return;
  try{
    const remote = await readDriveFile(DRIVE_HISTORY_FILE);
    history = mergeHistories(history, remote || []);
    await saveHistory();
    await writeDriveFile(DRIVE_HISTORY_FILE, history);
    await writeDriveFile(DRIVE_PROGRAM_FILE, program);
    await writeDriveFile(DRIVE_HEADER_FILE, appHeader);
    setSyncStatus('Synced just now');
  }catch(e){
    console.error(e);
    setSyncStatus('Sync failed — will retry next save');
  }
}

async function handleSyncClick(){
  if(accessToken){ await syncWithDrive(); return; }
  setSyncStatus('Connecting...');
  try{
    await ensureTokenClient();
    await requestToken('consent');
    localStorage.setItem('gdrive-connected', '1');
    await syncWithDrive();
  }catch(e){
    console.error(e);
    setSyncStatus('Connection failed — try again');
  }
}

      history = res && res.value ? JSON.parse(res.value) : [];
      return;
    }catch(e){ history = []; return; }
  }
  try{
    const raw = localStorage.getItem(STORAGE_HISTORY_KEY);
    history = raw ? JSON.parse(raw) : [];
  }catch(e){ history = []; }
}

async function saveHistory(){
  if(hasCloudStorage){
    try{ await window.storage.set(STORAGE_HISTORY_KEY, JSON.stringify(history), false); return; }
    catch(e){ console.error('Could not save to cloud storage', e); return; }
  }
  try{ localStorage.setItem(STORAGE_HISTORY_KEY, JSON.stringify(history)); }
  catch(e){ console.error('Could not save to local storage', e); }
}

      const res = await window.storage.get(STORAGE_PROGRAM_KEY, false);
      loaded = res && res.value ? JSON.parse(res.value) : null;
    }catch(e){ loaded = null; }

    try{
      const raw = localStorage.getItem(STORAGE_PROGRAM_KEY);
      loaded = raw ? JSON.parse(raw) : null;
    }catch(e){ loaded = null; }
  }
  program = (loaded && loaded.length) ? loaded : JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
}

async function saveProgram(){
  localStorage.setItem('program-edited-since-sync', '1');
  if(hasCloudStorage){
    try{ await window.storage.set(STORAGE_PROGRAM_KEY, JSON.stringify(program), false); return; }
    catch(e){ console.error('Could not save program to cloud storage', e); return; }
  }
  try{ localStorage.setItem(STORAGE_PROGRAM_KEY, JSON.stringify(program)); }
  catch(e){ console.error('Could not save program to local storage', e); }
}

async function loadHeader(){

  if(hasCloudStorage){
    try{
      const res = await window.storage.get(STORAGE_HEADER_KEY, false);
      loaded = res && res.value ? JSON.parse(res.value) : null;

async function saveHeader(){
  localStorage.setItem('program-edited-since-sync', '1');

  catch(e){ console.error('Could not save header to local storage', e); }
}

function e1rm(weight, reps){ return weight * (1 + reps/30); }

function canonicalize(name){
  return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function progressScore(ex, weight, reps){
  // For bodyweight moves with no added load, e1RM collapses to 0 regardless of reps,
  // so reps themselves are the right progress signal. Once weight is added (e.g. weighted pull-ups), e1RM works normally.
  if(ex.bw && weight === 0) return reps;
  return e1rm(weight, reps);
}

function bestFor(ex){
  const canonical = canonicalize(ex.name);
  let best = null;
  history.forEach(sess => {
    // Prefer the new canonical-name keyed format; fall back to legacy exId-keyed records.
    let sets = sess.exercises[canonical];
    if(!sets && ex.id) sets = sess.exercises[ex.id];
    if(!sets) return;
    sets.forEach(s => {
      const score = progressScore(ex, s.weight, s.reps);
      if(!best || score > best.score) best = { score, weight:s.weight, reps:s.reps };
    });
  });
  return best;
}

function lastSessionFor(dayId, ex){
  const canonical = canonicalize(ex.name);
  for(let i = history.length - 1; i >= 0; i--){
    const sess = history[i];
    if(sess.exercises[canonical]) return sess.exercises[canonical];
    if(sess.dayId === dayId && ex.id && sess.exercises[ex.id]) return sess.exercises[ex.id];
  }
  return null;
}

function getSessionHistoryFor(ex){
  const canonical = canonicalize(ex.name);
  const results = [];
  history.forEach(sess => {
    let sets = sess.exercises[canonical];
    if(!sets && ex.id) sets = sess.exercises[ex.id];
    if(!sets || !sets.length) return;
    const topSet = sets.reduce((a,b) => progressScore(ex,b.weight,b.reps) > progressScore(ex,a.weight,a.reps) ? b : a);
    const maxReps = Math.max(...sets.map(s => s.reps));
    results.push({ date: sess.date, score: progressScore(ex, topSet.weight, topSet.reps), topSet, maxReps });
  });
  // history array is already chronological (oldest first); keep that order
  return results;
}

function parseTargetRepCeiling(target){
  // Looks for patterns like "3 x 10-12" or "4 x 8-12 / leg" and returns the top of the range, or null if not parseable (e.g. AMRAP, "3 rounds").
  const match = String(target).match(/x\s*\d+\s*-\s*(\d+)/i);
  if(!match) return null;
  return Number(match[1]);
}

function getProgressionSuggestion(ex){
  const sessions = getSessionHistoryFor(ex);
  if(sessions.length < 2) return null;

  const recent = sessions.slice(-3);
  const repCeiling = parseTargetRepCeiling(ex.target);

  // Rep-ceiling check: last 2+ sessions all hit the top of the target rep range.
  if(repCeiling && recent.length >= 2){
    const lastTwo = sessions.slice(-2);
    const bothAtCeiling = lastTwo.every(s => s.maxReps >= repCeiling);
    if(bothAtCeiling){
      return { type:'add-weight', text:'Hit the top of your rep range twice in a row — try adding weight next session.' };
    }
  }

  // Stall check: last 3 sessions show no improvement in estimated 1RM.
  if(recent.length >= 3){
    const scores = recent.map(s => s.score);
    const noImprovement = scores.every((s, idx) => idx === 0 || s <= scores[idx-1] * 1.01);
    if(noImprovement){
      return { type:'stall', text:"No progress in 3 straight sessions — consider a lighter deload session or swapping rep tempo." };
    }
  }

  return null;
}

function renderTally(count){
  let html = '';
  let remaining = count;
  while(remaining > 0){
    const n = Math.min(remaining, 5);
    html += '<div class="tally-group">';
    for(let i=0;i<Math.min(n,4);i++) html += '<div class="tally-line"></div>';
    if(n === 5) html += '<div class="tally-line"></div><div class="tally-slash"></div>';
    html += '</div>';
    remaining -= n;
  }
  return html;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderNav(){
  const nav = document.getElementById('nav');
  const completedSet = getThisWeekCompletedDayIds();
  let html = '';
  program.forEach(d => {
    const done = isDayCompletedThisWeek(d, completedSet);
    html += `<button class="tab ${currentView==='log' && currentDayId===d.id ? 'active':''}" onclick="selectDay('${d.id}')">${done ? '&#10003; ':''}${escapeHtml(d.name)}</button>`;
  });
  html += `<button class="tab ${currentView==='history' ? 'active':''}" onclick="selectHistory()">History</button>`;
  html += `<button class="tab personalize-tab ${(currentView==='wizard'||currentView==='wizard-resolve') ? 'active':''}" onclick="startWizard()">Personalize</button>`;
  html += `<button class="tab edit-tab ${currentView==='edit' ? 'active':''}" onclick="selectEdit()">Edit program</button>`;
  nav.innerHTML = html;
}

function selectDay(id){
  currentDayId = id;
  currentView = 'log';
  resetRows();
  render();
}

function selectHistory(){ currentView = 'history'; render(); }

function selectEdit(){
  editingProgram = JSON.parse(JSON.stringify(program));
  currentView = 'edit';
  render();
}

function addSet(exId){ rows[exId].push({ weight:'', reps:'' }); render(); }
function removeSet(exId, idx){ if(rows[exId].length > 1) rows[exId].splice(idx,1); render(); }
function updateField(exId, idx, field, value){
  if(field === 'weight'){
    rows[exId][idx][field] = fromDisplayWeight(value);
  }else{
    rows[exId][idx][field] = value;
  }
}

function getThisWeekCompletedDayIds(){
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0 = Sunday
  const diffToMonday = (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
  const monday = new Date(now);
  monday.setHours(0,0,0,0);
  monday.setDate(now.getDate() - diffToMonday);

  const completed = new Set();
  history.forEach(sess => {
    const sessDate = new Date(sess.date);
    if(sessDate >= monday){
      completed.add(sess.dayId);
      if(sess.dayName) completed.add('name:' + sess.dayName);
    }
  });
  return completed;
}

function isDayCompletedThisWeek(day, completedSet){
  return completedSet.has(day.id) || completedSet.has('name:' + day.name);
}

function renderWeeklySummary(){
  const completedSet = getThisWeekCompletedDayIds();
  const completedCount = program.filter(d => isDayCompletedThisWeek(d, completedSet)).length;
  const totalDays = program.length;

  let dotsHtml = '';
  program.forEach(d => {
    const done = isDayCompletedThisWeek(d, completedSet);
    dotsHtml += `<span class="week-dot ${done ? 'done':''}" title="${escapeHtml(d.name)}"></span>`;
  });

  return `<div class="week-summary">
    <div class="week-summary-text">
      <span class="week-summary-count">${completedCount} / ${totalDays}</span> days done this week
    </div>
    <div class="week-dots">${dotsHtml}</div>
  </div>`;
}

function renderLog(){
  const day = program.find(d => d.id === currentDayId);
  if(!day){
    document.getElementById('main').innerHTML = `<p class="empty">No days in your program yet. Head to "Edit program" to add one.</p>`;
    document.getElementById('footer').innerHTML = '';
    return;
  }
  let html = `<div class="day-head-row">
      <div>
        <h2 class="day-head">${escapeHtml(day.name)}</h2>
        <p class="day-sub">${escapeHtml(day.sub || '')}</p>
      </div>
      <button class="edit-link" onclick="selectEdit()">Edit</button>
    </div>`;

  html += renderWeeklySummary();

  if(!day.exercises.length){
    html += `<p class="empty">No exercises on this day yet. Tap "Edit program" to add some.</p>`;
  }

  day.exercises.forEach(ex => {
    const last = lastSessionFor(currentDayId, ex);
    let lastText = 'No previous session logged';
    if(last && last.length){
      lastText = 'Last time: ' + last.map(s => ex.bw ? `${s.reps} reps${s.weight ? ' +'+toDisplayWeight(s.weight)+weightUnit:''}` : `${toDisplayWeight(s.weight)}${weightUnit} x ${s.reps}`).join(', ');
    }

    const suggestion = getProgressionSuggestion(ex);
    const suggestionHtml = suggestion
      ? `<p class="suggestion suggestion-${suggestion.type}">${suggestion.type === 'add-weight' ? '&#8593;' : '&#9888;'} ${escapeHtml(suggestion.text)}</p>`
      : '';

    html += `<div class="card">
      <div class="ex-name-row">
        <span class="ex-name">${escapeHtml(ex.name)}</span>
        <span class="pr-badge" id="pr-${ex.id}">PR</span>
        <button class="demo-btn" data-exname="${escapeHtml(ex.name)}" onclick="showExerciseDemo(this.dataset.exname)">&#9654; How to</button>
        <span class="ex-target">${escapeHtml(ex.target)}</span>
      </div>
      <p class="last-time">${lastText}</p>
      ${suggestionHtml}`;

    (rows[ex.id] || [{weight:'',reps:''}]).forEach((row,idx) => {
      html += `<div class="set-row">
        <span class="set-num">${idx+1}</span>
        <input type="number" inputmode="decimal" placeholder="${ex.bw ? 'added wt' : 'weight'}" value="${toDisplayWeight(row.weight)}" step="2.5"
          onchange="updateField('${ex.id}', ${idx}, 'weight', this.value)">
        <span class="unit">${weightUnit}</span>
        <input type="number" inputmode="numeric" placeholder="reps" value="${row.reps}"
          onchange="updateField('${ex.id}', ${idx}, 'reps', this.value)">
        <span class="unit">reps</span>
        <button class="remove-set" onclick="removeSet('${ex.id}', ${idx})" aria-label="Remove set">&times;</button>
      </div>`;
    });

    html += `<div class="row-actions">
        <button class="add-set" onclick="addSet('${ex.id}')">+ Add set</button>
        <div class="tally">${renderTally((rows[ex.id]||[]).filter(r=>r.weight!=='' || r.reps!=='').length)}</div>
      </div>
    </div>`;
  });

  document.getElementById('main').innerHTML = html;
  document.getElementById('footer').innerHTML = day.exercises.length ? `<button class="save-btn" onclick="saveWorkout()">Save workout</button>` : '';
  if(day.exercises.length){
    const msgEl = document.createElement('p');
    msgEl.className = 'save-msg';
    msgEl.id = 'save-msg';
    document.getElementById('main').appendChild(msgEl);
  }
}

function findExerciseMetaByCanonical(canonical){
  for(const day of program){
    const match = day.exercises.find(e => canonicalize(e.name) === canonical);
    if(match) return match;
  }
  return null;
}

let editingSessionId = null;
let editingSessionDraft = null;

function renderHistory(){
  let html = `<h2 class="day-head">History</h2>`;
  if(history.length === 0){
    html += `<p class="empty">No sessions logged yet. Log your first workout from the day tabs above.</p>`;
  }else{
    [...history].reverse().forEach(sess => {
      const day = program.find(d => d.id === sess.dayId);
      const dayName = sess.dayName || (day ? day.name : '(deleted day)');
      const sessId = sess.id || sess.date;

      if(editingSessionId === sessId){
        html += renderHistoryEditForm(sess, day, dayName);
        return;
      }

      html += `<div class="history-entry">
        <div class="history-date">${new Date(sess.date).toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'})}</div>
        <div class="history-day">${escapeHtml(dayName)}</div>`;
      Object.keys(sess.exercises).forEach(key => {
        let exMeta = findExerciseMetaByCanonical(key);
        let exName = exMeta ? exMeta.name : null;
        if(!exMeta && day){
          const legacyMatch = day.exercises.find(e => e.id === key);
          if(legacyMatch){ exMeta = legacyMatch; exName = legacyMatch.name; }
        }
        if(!exName) exName = key;
        const sets = sess.exercises[key];
        const text = sets.map(s => (exMeta && exMeta.bw) ? `${s.reps}${s.weight ? ' +'+toDisplayWeight(s.weight)+weightUnit:''}` : `${toDisplayWeight(s.weight)}${weightUnit}x${s.reps}`).join(', ');
        html += `<div class="history-ex">${escapeHtml(exName)}: ${text}</div>`;
      });
      html += `<div class="history-actions">
          <button class="history-action-btn" onclick="startEditSession('${escapeHtml(sessId)}')">Edit</button>
          <button class="history-action-btn danger" onclick="deleteSession('${escapeHtml(sessId)}')">Delete</button>
        </div>`;
      html += `</div>`;
    });
    html += `<button class="clear-btn" onclick="clearHistory()">Clear all history</button>`;
  }
  document.getElementById('main').innerHTML = html;
  document.getElementById('footer').innerHTML = '';
}

function renderHistoryEditForm(sess, day, dayName){
  let html = `<div class="history-entry">
    <div class="history-date">${new Date(sess.date).toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'})}</div>
    <div class="history-day">${escapeHtml(dayName)} — editing</div>`;

  Object.keys(editingSessionDraft.exercises).forEach(key => {
    let exMeta = findExerciseMetaByCanonical(key);
    let exName = exMeta ? exMeta.name : null;
    if(!exMeta && day){
      const legacyMatch = day.exercises.find(e => e.id === key);
      if(legacyMatch){ exMeta = legacyMatch; exName = legacyMatch.name; }
    }
    if(!exName) exName = key;
    const isBw = exMeta && exMeta.bw;

    html += `<div style="margin:0.6rem 0 0.3rem; font-size:0.85rem; font-weight:600;">${escapeHtml(exName)}</div>`;
    editingSessionDraft.exercises[key].forEach((set, idx) => {
      html += `<div class="history-edit-row">
        <span class="history-edit-setnum">${idx+1}</span>
        <input type="number" inputmode="decimal" placeholder="${isBw ? 'added wt':'weight'}" value="${toDisplayWeight(set.weight)}"
          onchange="updateEditingSet('${escapeHtml(key)}', ${idx}, 'weight', this.value)">
        <span class="history-edit-unit">${weightUnit}</span>
        <input type="number" inputmode="numeric" placeholder="reps" value="${set.reps}"
          onchange="updateEditingSet('${escapeHtml(key)}', ${idx}, 'reps', this.value)">
        <span class="history-edit-unit">reps</span>
      </div>`;
    });
  });

  html += `<div class="history-edit-actions">
      <button class="history-cancel-btn" onclick="cancelEditSession()">Cancel</button>
      <button class="history-save-btn" onclick="commitEditSession()">Save changes</button>
    </div>
  </div>`;
  return html;
}

function startEditSession(sessId){
  const sess = history.find(s => (s.id || s.date) === sessId);
  if(!sess) return;
  editingSessionId = sessId;
  editingSessionDraft = JSON.parse(JSON.stringify(sess));
  currentView = 'history';
  render();
}

function cancelEditSession(){
  editingSessionId = null;
  editingSessionDraft = null;
  render();
}

function updateEditingSet(key, idx, field, value){
  if(field === 'weight'){
    editingSessionDraft.exercises[key][idx][field] = fromDisplayWeight(value);
  }else{
    editingSessionDraft.exercises[key][idx][field] = Number(value) || 0;
  }
}

async function commitEditSession(){
  const idx = history.findIndex(s => (s.id || s.date) === editingSessionId);
  if(idx === -1) return;
  history[idx] = editingSessionDraft;
  await saveHistory();
  if(accessToken) await autoPushToDrive();
  editingSessionId = null;
  editingSessionDraft = null;
  render();
}

async function deleteSession(sessId){
  if(!confirm('Delete this single workout entry? This cannot be undone.')) return;
  history = history.filter(s => (s.id || s.date) !== sessId);
  await saveHistory();
  if(accessToken) await autoPushToDrive();
  render();
}

/* ---------- Edit mode ---------- */

function renderEdit(){
  let html = `<h2 class="day-head">Edit program</h2>
    <p class="day-sub">Drag to reorder days and exercises. Nothing is saved until you tap "Save changes".</p>
    <div class="day-pills" id="day-pills"></div>`;

  const activeDay = editingProgram.find(d => d.id === (currentDayId || (editingProgram[0] && editingProgram[0].id)));
  if(activeDay){
    html += `<input class="day-sub-edit" placeholder="Day description (optional)" value="${escapeHtml(activeDay.sub||'')}"
      onchange="updateDaySub('${activeDay.id}', this.value)">
      <div id="ex-list"></div>
      <button class="add-ex-btn" onclick="addExercise('${activeDay.id}')">+ Add exercise</button>`;
  }else{
    html += `<p class="empty">Add a day to get started.</p>`;
  }

  document.getElementById('main').innerHTML = html;
  document.getElementById('footer').innerHTML = `
    <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
    <button class="save-btn" onclick="commitEdit()">Save changes</button>`;
  const msgEl = document.createElement('p');
  msgEl.className = 'save-msg';
  msgEl.id = 'edit-msg';
  document.getElementById('main').appendChild(msgEl);
  renderDayPills();
  if(activeDay) renderExerciseList(activeDay);
}

function renderDayPills(){
  const el = document.getElementById('day-pills');
  let html = '';
  editingProgram.forEach((d, idx) => {
    const isActive = currentDayId === d.id || (!currentDayId && idx === 0);
    html += `<div class="day-pill ${isActive ? 'editing':''}" draggable="true"
        ondragstart="onDayDragStart(event, '${d.id}')"
        ondragover="onDayDragOver(event, '${d.id}')"
        ondrop="onDayDrop(event, '${d.id}')"
        ondragend="onDragEnd(event)">
      <span class="drag-handle">&#8942;&#8942;</span>
      <input value="${escapeHtml(d.name)}" onclick="event.stopPropagation()" onfocus="setActiveEditDay('${d.id}')"
        onchange="updateDayName('${d.id}', this.value)">
      <button class="del-day" onclick="deleteDay(event, '${d.id}')" aria-label="Delete day">&times;</button>
    </div>`;
  });
  html += `<button class="add-day-pill" onclick="addDay()">+ Add day</button>`;
  el.innerHTML = html;

  el.querySelectorAll('.day-pill').forEach((pillEl, idx) => {
    pillEl.addEventListener('click', (e) => {
      if(e.target.tagName === 'INPUT' || e.target.classList.contains('del-day')) return;
      setActiveEditDay(editingProgram[idx].id);
    });
  });
}

function setActiveEditDay(id){
  currentDayId = id;
  renderDayPills();
  const day = editingProgram.find(d => d.id === id);
  const subInput = document.querySelector('.day-sub-edit');
  if(subInput){
    subInput.value = day.sub || '';
    subInput.setAttribute('onchange', `updateDaySub('${id}', this.value)`);
  }
  renderExerciseList(day);
}

function renderExerciseList(day){
  const el = document.getElementById('ex-list');
  if(!el) return;
  let html = '';
  day.exercises.forEach((ex) => {
    html += `<div class="ex-edit-card" draggable="true" data-ex-id="${ex.id}"
        ondragstart="onExDragStart(event, '${day.id}', '${ex.id}')"
        ondragover="onExDragOver(event, '${day.id}', '${ex.id}')"
        ondrop="onExDrop(event, '${day.id}', '${ex.id}')"
        ondragend="onDragEnd(event)">
      <span class="drag-handle-ex">&#8942;&#8942;</span>
      <div class="ex-edit-fields">
        <input placeholder="Exercise name" value="${escapeHtml(ex.name)}" onchange="updateExField('${day.id}','${ex.id}','name',this.value)">
        <div class="ex-edit-row2">
          <input placeholder="Target (e.g. 3 x 10-12)" value="${escapeHtml(ex.target)}" onchange="updateExField('${day.id}','${ex.id}','target',this.value)">
          <label class="bw-toggle">
            <input type="checkbox" ${ex.bw ? 'checked':''} onchange="updateExField('${day.id}','${ex.id}','bw',this.checked)" style="width:auto;">
            Bodyweight
          </label>
        </div>
      </div>
      <button class="del-ex" onclick="deleteExercise('${day.id}','${ex.id}')" aria-label="Delete exercise">&times;</button>
    </div>`;
  });
  el.innerHTML = html || `<p class="empty">No exercises yet. Add one below.</p>`;
}

function markEditDirty(){
  const el = document.getElementById('edit-msg');
  if(el) el.textContent = 'Unsaved changes';
}

async function commitEdit(){
  program = JSON.parse(JSON.stringify(editingProgram));
  await saveProgram();
  if(accessToken) await autoPushToDrive();
  const el = document.getElementById('edit-msg');
  if(el) el.textContent = 'Program saved.';
  currentView = 'log';
  if(!program.find(d => d.id === currentDayId)) currentDayId = program[0] ? program[0].id : null;
  resetRows();
  render();
}

function cancelEdit(){
  editingProgram = JSON.parse(JSON.stringify(program));
  currentView = 'log';
  if(!program.find(d => d.id === currentDayId)) currentDayId = program[0] ? program[0].id : null;
  resetRows();
  render();
}

function updateDayName(id, value){
  const d = editingProgram.find(d => d.id === id);
  d.name = value || 'Untitled day';
  markEditDirty();
}

function updateDaySub(id, value){
  const d = editingProgram.find(d => d.id === id);
  d.sub = value;
  markEditDirty();
}

function addDay(){
  const newDay = { id: uid('d'), name: 'New day', sub:'', exercises:[] };
  editingProgram.push(newDay);
  currentDayId = newDay.id;
  markEditDirty();
  render();
}

function deleteDay(e, id){
  e.stopPropagation();
  if(editingProgram.length <= 1){ alert('You need at least one day in your program.'); return; }
  if(!confirm('Delete this day and all its exercises from the program? Past history stays intact.')) return;
  editingProgram = editingProgram.filter(d => d.id !== id);
  if(currentDayId === id) currentDayId = editingProgram[0].id;
  markEditDirty();
  render();
}

function addExercise(dayId){
  const d = editingProgram.find(d => d.id === dayId);
  d.exercises.push({ id: uid('ex'), name:'New exercise', target:'3 x 10-12', bw:false });
  markEditDirty();
  render();
}

function deleteExercise(dayId, exId){
  const d = editingProgram.find(d => d.id === dayId);
  d.exercises = d.exercises.filter(e => e.id !== exId);
  markEditDirty();
  render();
}

function updateExField(dayId, exId, field, value){
  const d = editingProgram.find(d => d.id === dayId);
  const ex = d.exercises.find(e => e.id === exId);
  ex[field] = value;
  markEditDirty();
}

/* drag and drop: days */
function onDayDragStart(e, id){
  dragState = { type:'day', id };
  e.target.closest('.day-pill').style.opacity = '0.4';
}
function onDayDragOver(e, overId){ e.preventDefault(); }
function onDayDrop(e, overId){
  e.preventDefault();
  if(!dragState || dragState.type !== 'day') return;
  const fromIdx = editingProgram.findIndex(d => d.id === dragState.id);
  const toIdx = editingProgram.findIndex(d => d.id === overId);
  if(fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
  const [moved] = editingProgram.splice(fromIdx, 1);
  editingProgram.splice(toIdx, 0, moved);
  markEditDirty();
  render();
}

/* drag and drop: exercises */
function onExDragStart(e, dayId, exId){
  dragState = { type:'ex', dayId, exId };
  e.target.closest('.ex-edit-card').classList.add('dragging');
}
function onExDragOver(e, dayId, overExId){ e.preventDefault(); }
function onExDrop(e, dayId, overExId){
  e.preventDefault();
  if(!dragState || dragState.type !== 'ex' || dragState.dayId !== dayId) return;
  const d = editingProgram.find(d => d.id === dayId);
  const fromIdx = d.exercises.findIndex(ex => ex.id === dragState.exId);
  const toIdx = d.exercises.findIndex(ex => ex.id === overExId);
  if(fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
  const [moved] = d.exercises.splice(fromIdx, 1);
  d.exercises.splice(toIdx, 0, moved);
  markEditDirty();
  render();
}
function onDragEnd(e){ dragState = null; }

/* ---------- workout save / history clear ---------- */

async function clearHistory(){
  if(!confirm('This will permanently delete all logged workouts. Continue?')) return;
  history = [];
  await saveHistory();
  if(accessToken){
    try{ await writeDriveFile(DRIVE_HISTORY_FILE, []); setSyncStatus('Synced just now'); }
    catch(e){ console.error(e); setSyncStatus('Sync failed — will retry next save'); }
  }
  render();
}

async function saveWorkout(){
  const day = program.find(d => d.id === currentDayId);
  if(!day) return;
  const sessionExercises = {};
  let anyLogged = false;
  let prs = [];

  day.exercises.forEach(ex => {
    const setRows = (rows[ex.id] || [])
      .filter(r => r.weight !== '' || r.reps !== '')
      .map(r => ({ weight: Number(r.weight)||0, reps: Number(r.reps)||0 }))
      .filter(r => r.reps > 0);

    if(setRows.length){
      anyLogged = true;
      const priorBest = bestFor(ex);
      const topThisSession = setRows.reduce((a,b)=> progressScore(ex,b.weight,b.reps) > progressScore(ex,a.weight,a.reps) ? b : a);
      if(!priorBest || progressScore(ex, topThisSession.weight, topThisSession.reps) > priorBest.score) prs.push(ex.id);
      sessionExercises[canonicalize(ex.name)] = setRows;
    }
  });

  if(!anyLogged){
    document.getElementById('save-msg').textContent = 'Enter at least one set before saving.';
    return;
  }

  history.push({ id: uid('sess'), date: new Date().toISOString(), dayId: currentDayId, dayName: day.name, exercises: sessionExercises });
  await saveHistory();

  prs.forEach(exId => {
    const badge = document.getElementById('pr-'+exId);
    if(badge) badge.style.display = 'inline-block';
  });

  document.getElementById('save-msg').textContent =
    prs.length ? `Workout saved — new PR on ${prs.length} exercise${prs.length>1?'s':''}!` : 'Workout saved.';

  if(accessToken) await autoPushToDrive();
}

let wizardStep = 0;
let wizardAnswers = {};
let pendingGeneratedProgram = null;

const LOADING_MESSAGES = [
  'Sizing up your goals...',
  'Raiding the exercise database...',
  'Matching moves to your equipment...',
  'Stacking sets and reps...',
  'Balancing push and pull...',
  'Sneaking in some extra leg work...',
  'Sequencing your training week...',
  'Checking nothing got left out...',
  'Tightening up the rep ranges...',
  'Sharpening the program...',
  'Future you says thanks...',
  'Strong body, stronger habits...',
  'No pain, no... well, some gain...',
  'Programming progress, one set at a time...',
  'Almost ready to lift...',
];

const MIN_GENERATION_MS = 10000;

function startWizard(){
  wizardStep = 0;
  wizardAnswers = {};
  currentView = 'wizard';
  render();
}

function wizardSelect(key, value, multi){
  if(multi){
    const arr = wizardAnswers[key] || [];
    const idx = arr.indexOf(value);
    if(idx === -1) arr.push(value); else arr.splice(idx, 1);
    wizardAnswers[key] = arr;
  }else{
    wizardAnswers[key] = value;
  }
  renderWizard();
}

function wizardCanAdvance(){
  const q = WIZARD_QUESTIONS[wizardStep];
  if(q.optional) return true;
  const val = wizardAnswers[q.key];
  if(q.multi) return Array.isArray(val) && val.length > 0;
  return val !== undefined && val !== null;
}

function wizardNext(){
  if(wizardStep < WIZARD_QUESTIONS.length - 1){
    wizardStep++;
    renderWizard();
  }else{
    finishWizard();
  }
}

function wizardBack(){
  if(wizardStep > 0){
    wizardStep--;
    renderWizard();
  }else{
    localStorage.setItem('wizard-completed', '1');
    currentView = 'log';
    render();
  }
}

function renderWizard(){
  const q = WIZARD_QUESTIONS[wizardStep];
  const selected = wizardAnswers[q.key];

  let html = `<div class="wizard-progress">`;
  WIZARD_QUESTIONS.forEach((_, idx) => {
    const cls = idx < wizardStep ? 'done' : (idx === wizardStep ? 'current' : '');
    html += `<div class="wizard-progress-seg ${cls}"></div>`;
  });
  html += `</div>`;

  html += `<div class="wizard-card">
    <h2 class="wizard-q">${escapeHtml(q.question)}</h2>
    <p class="wizard-hint">${escapeHtml(q.hint)}</p>
    <div class="${q.grid ? 'wizard-opt-grid' : 'wizard-options'}">`;

  q.options.forEach(opt => {
    let isSelected;
    if(q.multi){
      isSelected = Array.isArray(selected) && selected.includes(opt.value);
    }else{
      isSelected = selected === opt.value;
    }
    html += `<button class="wizard-opt ${isSelected ? 'selected':''}"
      onclick='wizardSelect(${JSON.stringify(q.key)}, ${JSON.stringify(opt.value)}, ${q.multi})'>${escapeHtml(opt.label)}</button>`;
  });

  html += `</div>
    <div class="wizard-nav">
      <button class="wizard-back" onclick="wizardBack()">${wizardStep === 0 ? 'Cancel' : 'Back'}</button>
      <button class="wizard-next" ${wizardCanAdvance() ? '' : 'disabled'} onclick="wizardNext()">
        ${wizardStep === WIZARD_QUESTIONS.length - 1 ? 'Generate program' : 'Next'}
      </button>
    </div>
  </div>`;

  document.getElementById('main').innerHTML = html;
  document.getElementById('footer').innerHTML = '';
}

let loadingInterval = null;

function shuffledMessages(){
  const arr = [...LOADING_MESSAGES];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderLoadingScreen(){
  document.getElementById('nav').innerHTML = '';
  document.getElementById('footer').innerHTML = '';
  document.getElementById('main').innerHTML = `
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loading-text">Warming up...</div>
      <div class="loading-sub">Building your personalized program</div>
    </div>`;

  const order = shuffledMessages();
  let msgIdx = 0;
  const textEl = () => document.getElementById('loading-text');

  if(textEl()) textEl().textContent = order[msgIdx];

  loadingInterval = setInterval(() => {
    const el = textEl();
    if(!el) return;
    el.classList.add('fading');
    setTimeout(() => {
      msgIdx = (msgIdx + 1) % order.length;
      const el2 = textEl();
      if(!el2) return;
      el2.textContent = order[msgIdx];
      el2.classList.remove('fading');
    }, 300);
  }, 1600);
}

function stopLoadingScreen(){
  if(loadingInterval){
    clearInterval(loadingInterval);
    loadingInterval = null;
  }
}

async function finishWizard(){
  currentView = 'loading';
  renderLoadingScreen();

  const startTime = Date.now();

  const equipment = wizardAnswers.equipment || [];
  const generated = generatePersonalizedProgram({
    daysPerWeek: wizardAnswers.daysPerWeek || 4,
    goal: wizardAnswers.goal || 'general',
    equipment,
    focusMuscle: wizardAnswers.focusMuscle || null,
    experience: wizardAnswers.experience || 'intermediate',
  });

  const elapsed = Date.now() - startTime;
  const remaining = Math.max(0, MIN_GENERATION_MS - elapsed);
  await new Promise(resolve => setTimeout(resolve, remaining));

  stopLoadingScreen();

  const hasExistingProgram = program.length > 0 && program.some(d => d.exercises.length > 0);

  if(!hasExistingProgram){
    program = generated;
    await saveProgram();
    if(accessToken) await autoPushToDrive();
    currentDayId = program[0] ? program[0].id : null;
    resetRows();
    currentView = 'log';
    localStorage.setItem('wizard-completed', '1');
    render();
    return;
  }

  pendingGeneratedProgram = generated;
  currentView = 'wizard-resolve';
  render();
}

function renderWizardResolve(){
  let html = `<div class="wizard-card">
    <h2 class="wizard-q">Apply your new program?</h2>
    <p class="wizard-hint">You already have a program with exercises in it. Choose how to apply the personalized plan.</p>
    <div class="wizard-options">
      <button class="wizard-opt" onclick="resolveWizard('replace')">Replace my current program entirely</button>
      <button class="wizard-opt" onclick="resolveWizard('merge')">Add these as new days alongside my current ones</button>
      <button class="wizard-opt" onclick="resolveWizard('cancel')">Cancel — keep what I have</button>
    </div>
  </div>`;

  html += `<h3 class="day-head" style="margin-top:1.5rem;">Preview</h3>`;
  pendingGeneratedProgram.forEach(day => {
    html += `<div class="wizard-preview-day">
      <div class="wizard-preview-day-name">${escapeHtml(day.name)}</div>`;
    day.exercises.forEach(ex => {
      html += `<div class="wizard-preview-ex">${escapeHtml(ex.name)} — ${escapeHtml(ex.target)}</div>`;
    });
    html += `</div>`;
  });

  document.getElementById('main').innerHTML = html;
  document.getElementById('footer').innerHTML = '';
}

async function resolveWizard(action){
  if(action === 'cancel'){
    pendingGeneratedProgram = null;
    localStorage.setItem('wizard-completed', '1');
    currentView = 'log';
    render();
    return;
  }

  if(action === 'replace'){
    program = pendingGeneratedProgram;
  }else if(action === 'merge'){
    program = [...program, ...pendingGeneratedProgram];
  }

  await saveProgram();
  if(accessToken) await autoPushToDrive();
  pendingGeneratedProgram = null;
  currentDayId = program[0] ? program[0].id : null;
  resetRows();
  currentView = 'log';
  localStorage.setItem('wizard-completed', '1');
  render();
}

  else if(currentView === 'wizard') renderWizard();
  else if(currentView === 'wizard-resolve') renderWizardResolve();

}

(async function init(){

  const wizardAlreadyRun = localStorage.getItem('wizard-completed') === '1';

  if(!wizardAlreadyRun){
    startWizard();
  }else{
    render();
